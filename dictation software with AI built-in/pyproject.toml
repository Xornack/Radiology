[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"

[project]
name = "proj"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "PyQt6",
    "loguru",
    "requests",
    "numpy",
    "sounddevice",
    "hidapi",
    "pynetdicom",
    "pydicom",
    "cryptography",
    "faster-whisper",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-qt",
]
